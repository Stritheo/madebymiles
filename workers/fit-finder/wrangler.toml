name = "fit-finder"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "RATE_LIMIT_KV", id = "238b5712c7fe45dcb0c020aa7850036d" }
]

routes = [
  { pattern = "madebymiles.ai/api/*", zone_name = "madebymiles.ai" }
]

[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put):
# ANTHROPIC_API_KEY
# JWT_SECRET
# DISCORD_WEBHOOK_REPORTS
# DISCORD_WEBHOOK_ALERTS
