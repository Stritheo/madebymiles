name = "fit-finder"
account_id = "1504b13b46ac883914f1086a07da7b58"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "RATE_LIMIT_KV", id = "238b5712c7fe45dcb0c020aa7850036d" }
]

routes = [
  { pattern = "milessowden.au/api/*", zone_name = "milessowden.au" }
]

[[send_email]]
name = "SEND_EMAIL"
destination_address = "miles.sowden@outlook.com"

[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put):
# ANTHROPIC_API_KEY
# JWT_SECRET
# DISCORD_WEBHOOK_ALERTS
# TURNSTILE_SECRET_KEY
# DATABRICKS_HOST               (e.g. https://dbc-0caa5555-b747.cloud.databricks.com)
# DATABRICKS_TOKEN              (Databricks personal access token)
# DATABRICKS_WAREHOUSE_ID       (SQL warehouse ID for statement API)
