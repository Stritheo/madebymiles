name: Create PR for Claude branches

on:
  push:
    branches: ['claude/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create PR if none exists
        run: |
          EXISTING=$(gh pr list --head "$GITHUB_REF_NAME" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            TITLE=$(git log --format='%s' -1)
            BODY=$(git log --format='%b' -1)
            gh pr create \
              --title "$TITLE" \
              --body "${BODY:-Auto-created from $GITHUB_REF_NAME}" \
              --base main \
              --head "$GITHUB_REF_NAME"
            echo "PR created"
          else
            echo "PR #$EXISTING already exists"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
