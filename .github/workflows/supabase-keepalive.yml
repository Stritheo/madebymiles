name: Supabase Keep-Alive

on:
  schedule:
    # Run daily at 01:00 UTC (11am AEST) to prevent Supabase free tier pausing
    - cron: '0 1 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent pause
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secrets"
            exit 1
          fi

          # Simple REST API call that keeps the project active
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/?limit=0")

          echo "Supabase response: HTTP $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Keep-alive successful"
          else
            echo "Keep-alive failed with HTTP $STATUS"
            exit 1
          fi
