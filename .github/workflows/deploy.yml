name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Log deploy to Databricks
        if: success()
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ vars.DATABRICKS_WAREHOUSE_ID }}
        run: |
          SQL="INSERT INTO madebymiles.observability.alert_events (source, severity, title, message, metadata, created_at) VALUES ('deploy', 'info', 'Deploy Successful', 'Commit: ${GITHUB_SHA::7} by ${GITHUB_ACTOR}', '{\"commit\":\"${GITHUB_SHA::7}\",\"actor\":\"${GITHUB_ACTOR}\"}', '$(date -u +%Y-%m-%dT%H:%M:%SZ)')"
          curl -s -X POST "${DATABRICKS_HOST}/api/2.0/sql/statements" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"statement\": \"${SQL}\", \"warehouse_id\": \"${DATABRICKS_WAREHOUSE_ID}\", \"wait_timeout\": \"10s\"}" \
            -o /dev/null || true

  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://milessowden.au/
            https://milessowden.au/experience/
            https://milessowden.au/contact/
            https://milessowden.au/fit/
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true

      - name: Log Lighthouse results to Databricks
        if: always()
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ vars.DATABRICKS_WAREHOUSE_ID }}
        run: |
          SQL="INSERT INTO madebymiles.observability.alert_events (source, severity, title, message, metadata, created_at) VALUES ('lighthouse', 'info', 'Lighthouse CI Complete', 'Pages tested: homepage, experience, contact, fit. Run: ${GITHUB_RUN_ID}', '{\"run_id\":\"${GITHUB_RUN_ID}\",\"pages\":[\"homepage\",\"experience\",\"contact\",\"fit\"]}', '$(date -u +%Y-%m-%dT%H:%M:%SZ)')"
          curl -s -X POST "${DATABRICKS_HOST}/api/2.0/sql/statements" \
            -H "Authorization: Bearer ${DATABRICKS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"statement\": \"${SQL}\", \"warehouse_id\": \"${DATABRICKS_WAREHOUSE_ID}\", \"wait_timeout\": \"10s\"}" \
            -o /dev/null || true

  deploy-worker:
    needs: deploy
    runs-on: ubuntu-latest
    if: vars.WORKER_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Generate profile JSON
        run: npm ci && npm run generate-profile

      - name: Deploy Fit Finder Worker
        working-directory: workers/fit-finder
        run: npm ci && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  notify-worker-failure:
    needs: [deploy-worker]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord (worker deploy failed)
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Worker Deploy FAILED\",\"description\":\"**Repo:** madebymiles\n**Commit:** \`${GITHUB_SHA::7}\`\n**By:** ${GITHUB_ACTOR}\n**Details:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"color\":15158332}]}" \
            "${{ secrets.DISCORD_WEBHOOK_ALERTS }}"

  notify-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord (failure)
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Build/Deploy FAILED\",\"description\":\"**Repo:** madebymiles\n**Commit:** \`${GITHUB_SHA::7}\`\n**By:** ${GITHUB_ACTOR}\n**Details:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"color\":15158332}]}" \
            "${{ secrets.DISCORD_WEBHOOK_ALERTS }}"
